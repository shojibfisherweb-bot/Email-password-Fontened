<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket.IO Server Test Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .status-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #1a1a1a;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #00d4ff;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff8866;
        }

        .status-dot.offline {
            background: #ff4444;
            box-shadow: 0 0 10px #ff444466;
        }

        .badge {
            background: #2a2a2a;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #aaa;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #151515;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #2a2a2a;
        }

        .card h2 {
            font-size: 16px;
            color: #00d4ff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h2 .count {
            background: #00d4ff22;
            padding: 0 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #00d4ff;
        }

        .btn {
            background: #00d4ff;
            color: #0a0a0a;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 8px;
        }

        .btn:hover {
            background: #00bbee;
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: #ff4444;
        }

        .btn-danger:hover {
            background: #dd3333;
        }

        .btn-success {
            background: #00ff88;
        }

        .btn-success:hover {
            background: #00dd77;
        }

        .btn-warning {
            background: #ffaa00;
        }

        .btn-warning:hover {
            background: #dd9900;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-group input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .input-group .btn {
            width: auto;
            margin-bottom: 0;
            padding: 8px 16px;
            font-size: 13px;
        }

        .log-container {
            background: #0a0a0a;
            border-radius: 6px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            border: 1px solid #1a1a1a;
            margin-top: 10px;
        }

        .log-container .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #111;
            display: flex;
            gap: 8px;
        }

        .log-container .log-entry .time {
            color: #666;
            min-width: 70px;
        }

        .log-container .log-entry .type {
            font-weight: 600;
            min-width: 80px;
        }

        .log-container .log-entry .type.info {
            color: #00d4ff;
        }

        .log-container .log-entry .type.success {
            color: #00ff88;
        }

        .log-container .log-entry .type.error {
            color: #ff4444;
        }

        .log-container .log-entry .type.warning {
            color: #ffaa00;
        }

        .log-container .log-entry .type.event {
            color: #bb88ff;
        }

        .log-container .log-entry .msg {
            color: #ccc;
            word-break: break-all;
        }

        .log-container::-webkit-scrollbar {
            width: 6px;
        }

        .log-container::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }

        .inline-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .inline-group .btn {
            width: auto;
            flex: 1;
            min-width: 80px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .full-width {
                grid-column: 1;
            }
        }

        .server-url {
            background: #1a1a1a;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .server-url input {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            min-width: 200px;
        }

        .server-url .btn {
            width: auto;
            padding: 6px 16px;
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 Socket.IO Server Test Panel</h1>

        <!-- Server URL -->
        <div class="server-url">
            <span style="color:#888;">Server URL:</span>
            <input type="text" id="serverUrl" value="https://email-password-backend-production.up.railway.app" />
            <button class="btn btn-success" onclick="connectSocket()">🔌 Connect</button>
            <button class="btn btn-danger" onclick="disconnectSocket()">⛔ Disconnect</button>
            <span id="connectionStatus" style="color:#888; font-size:13px;">Disconnected</span>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span class="status-dot offline" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
            <div class="status-item">
                <span>📊 Clients:</span>
                <span id="clientCount">0</span>
            </div>
            <div class="status-item">
                <span>🏠 Rooms:</span>
                <span id="roomCount">0</span>
            </div>
            <div class="status-item">
                <span>⏱️ Uptime:</span>
                <span id="uptimeDisplay">0s</span>
            </div>
            <div class="status-item">
                <span class="badge" id="envBadge">dev</span>
            </div>
        </div>

        <!-- Grid -->
        <div class="grid">

            <!-- Socket.IO Events -->
            <div class="card">
                <h2>📡 Socket.IO Events</h2>
                <button class="btn" onclick="emitJoinRoom()">🏠 Join Room (test_room)</button>
                <button class="btn btn-warning" onclick="emitLeaveRoom()">🚪 Leave Room (test_room)</button>
                <button class="btn" onclick="emitCustomEvent()">📤 Emit Custom Event</button>
                <button class="btn btn-danger" onclick="disconnectSocket()">⛔ Disconnect</button>
                <div style="margin-top:10px;font-size:12px;color:#888;">
                    <span>Socket ID: <span id="socketIdDisplay">-</span></span>
                </div>
            </div>

            <!-- Admin Notifications -->
            <div class="card">
                <h2>📧 Admin Notifications</h2>
                <div class="input-group">
                    <input type="text" id="adminEmail" placeholder="Email" value="admin@test.com" />
                </div>
                <div class="input-group">
                    <input type="text" id="adminType" placeholder="Type" value="info" />
                </div>
                <div class="input-group">
                    <input type="text" id="adminMessage" placeholder="Message" value="Test notification from panel" />
                </div>
                <button class="btn btn-success" onclick="sendAdminNotification()">📨 Send Notification</button>
            </div>

            <!-- Admin Actions -->
            <div class="card">
                <h2>🔔 Admin Actions</h2>
                <div class="input-group">
                    <input type="text" id="actionUserId" placeholder="User ID" value="user123" />
                </div>
                <div class="input-group">
                    <input type="text" id="actionStatus" placeholder="New Status" value="approved" />
                </div>
                <div class="input-group">
                    <input type="text" id="actionEmail" placeholder="Email" value="user@test.com" />
                </div>
                <div class="input-group">
                    <input type="text" id="actionAuthCode" placeholder="Auth Code (optional)" value="ABC123" />
                </div>
                <button class="btn btn-warning" onclick="sendAdminAction()">⚡ Send Action</button>
            </div>

            <!-- API Endpoints -->
            <div class="card">
                <h2>🔗 API Endpoints</h2>
                <button class="btn" onclick="testHealth()">🏥 Health Check</button>
                <button class="btn" onclick="testStatus()">📊 Status</button>
                <button class="btn" onclick="testTest()">🧪 Test Endpoint</button>
                <div id="apiResponse"
                    style="margin-top:10px;font-size:12px;color:#888;max-height:80px;overflow-y:auto;background:#0a0a0a;padding:8px;border-radius:4px;">
                </div>
            </div>

            <!-- Logs -->
            <div class="card full-width">
                <h2>📋 Event Log <span class="count" id="logCount">0</span></h2>
                <div style="display:flex;gap:8px;margin-bottom:8px;">
                    <button class="btn" style="width:auto;padding:4px 16px;font-size:12px;" onclick="clearLogs()">🗑️
                        Clear</button>
                    <button class="btn btn-success" style="width:auto;padding:4px 16px;font-size:12px;"
                        onclick="exportLogs()">📤 Export</button>
                </div>
                <div class="log-container" id="logContainer"></div>
            </div>

        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // ===== STATE =====
        let socket = null;
        let isConnected = false;
        let logEntries = [];
        let logId = 0;

        // ===== DOM REFS =====
        const logContainer = document.getElementById('logContainer');
        const logCount = document.getElementById('logCount');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const clientCount = document.getElementById('clientCount');
        const roomCount = document.getElementById('roomCount');
        const uptimeDisplay = document.getElementById('uptimeDisplay');
        const socketIdDisplay = document.getElementById('socketIdDisplay');
        const envBadge = document.getElementById('envBadge');
        const apiResponse = document.getElementById('apiResponse');

        // ===== LOGGING =====
        function addLog(type, message, data) {
            const time = new Date().toLocaleTimeString();
            const entry = { id: logId++, time, type, message, data };
            logEntries.push(entry);
            renderLogs();
            updateLogCount();
        }

        function renderLogs() {
            logContainer.innerHTML = logEntries.map(e => `
                <div class="log-entry">
                    <span class="time">${e.time}</span>
                    <span class="type ${e.type}">[${e.type}]</span>
                    <span class="msg">${e.message} ${e.data ? JSON.stringify(e.data) : ''}</span>
                </div>
            `).join('');
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function updateLogCount() {
            logCount.textContent = logEntries.length;
        }

        function clearLogs() {
            logEntries = [];
            renderLogs();
            updateLogCount();
        }

        function exportLogs() {
            const data = logEntries.map(e => `${e.time} [${e.type}] ${e.message} ${e.data ? JSON.stringify(e.data) : ''}`).join('\n');
            const blob = new Blob([data], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `socket-logs-${new Date().toISOString().slice(0, 10)}.txt`;
            a.click();
        }

        // ===== STATUS UPDATE =====
        function updateStatus(connected) {
            isConnected = connected;
            if (connected) {
                statusDot.className = 'status-dot online';
                statusText.textContent = 'Connected';
                statusText.style.color = '#00ff88';
            } else {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Disconnected';
                statusText.style.color = '#ff4444';
                socketIdDisplay.textContent = '-';
            }
        }

        function updateStats(data) {
            if (data.clients !== undefined) clientCount.textContent = data.clients;
            if (data.rooms !== undefined) roomCount.textContent = data.rooms;
            if (data.uptime !== undefined) {
                const mins = Math.floor(data.uptime / 60);
                const secs = data.uptime % 60;
                uptimeDisplay.textContent = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
            }
            if (data.environment) envBadge.textContent = data.environment;
        }

        // ===== SOCKET.IO =====
        function getServerUrl() {
            return document.getElementById('serverUrl').value.trim();
        }

        function connectSocket() {
            if (socket) {
                addLog('warning', 'Socket already exists, disconnecting first...');
                disconnectSocket();
            }

            const url = getServerUrl();
            addLog('info', `Connecting to ${url}...`);

            try {
                socket = io(url, {
                    transports: ['websocket', 'polling'],
                    path: '/socket.io/',
                    reconnection: true,
                    reconnectionAttempts: 5,
                    reconnectionDelay: 1000,
                });

                // --- Event handlers ---
                socket.on('connect', () => {
                    addLog('success', `Connected! Socket ID: ${socket.id}`);
                    updateStatus(true);
                    socketIdDisplay.textContent = socket.id;
                    fetchStatus();
                });

                socket.on('disconnect', (reason) => {
                    addLog('error', `Disconnected: ${reason}`);
                    updateStatus(false);
                    if (reason === 'io server disconnect') {
                        // server initiated disconnect, try reconnecting manually
                        addLog('warning', 'Server initiated disconnect, reconnecting...');
                        setTimeout(() => socket.connect(), 1000);
                    }
                });

                socket.on('connect_error', (error) => {
                    addLog('error', `Connection error: ${error.message}`);
                    updateStatus(false);
                });

                socket.on('reconnect_attempt', (attempt) => {
                    addLog('warning', `Reconnection attempt ${attempt}...`);
                });

                socket.on('reconnect_failed', () => {
                    addLog('error', 'Reconnection failed');
                });

                // --- Custom event listeners ---
                socket.on('admin_notification', (data) => {
                    addLog('event', '📧 Admin notification received', data);
                });

                socket.on('user_update', (data) => {
                    addLog('event', '🔔 User update received', data);
                });

                socket.on('custom_response', (data) => {
                    addLog('event', '📤 Custom response received', data);
                });

                socket.on('room_joined', (data) => {
                    addLog('success', `🏠 Room joined: ${data.room}`, data);
                });

                socket.on('room_left', (data) => {
                    addLog('info', `🚪 Room left: ${data.room}`, data);
                });

                socket.on('error', (error) => {
                    addLog('error', `Socket error: ${error}`);
                });

                // Any other events
                socket.onAny((event, ...args) => {
                    if (!['connect', 'disconnect', 'connect_error', 'reconnect_attempt', 'reconnect_failed',
                        'admin_notification', 'user_update', 'custom_response', 'room_joined', 'room_left', 'error'
                    ].includes(event)) {
                        addLog('event', `📡 ${event}`, args[0]);
                    }
                });

            } catch (e) {
                addLog('error', `Failed to connect: ${e.message}`);
            }
        }

        function disconnectSocket() {
            if (socket) {
                socket.disconnect();
                socket = null;
                updateStatus(false);
                addLog('info', 'Disconnected manually');
            }
        }

        // ===== SOCKET EMITTERS =====
        function emitJoinRoom() {
            if (!isConnected) { addLog('error', 'Not connected'); return; }
            const room = 'test_room';
            socket.emit('join_room', room);
            addLog('info', `Emitting join_room: ${room}`);
        }

        function emitLeaveRoom() {
            if (!isConnected) { addLog('error', 'Not connected'); return; }
            const room = 'test_room';
            socket.emit('leave_room', room);
            addLog('info', `Emitting leave_room: ${room}`);
        }

        function emitCustomEvent() {
            if (!isConnected) { addLog('error', 'Not connected'); return; }
            const data = {
                message: 'Hello from test panel!',
                timestamp: new Date().toISOString(),
                random: Math.random()
            };
            socket.emit('custom_event', data);
            addLog('info', '📤 Emitted custom_event', data);
        }

        // ===== API CALLS =====
        async function fetchStatus() {
            try {
                const url = getServerUrl();
                const res = await fetch(`${url}/api/status`);
                const data = await res.json();
                updateStats(data);
                addLog('info', '📊 Status fetched', data);
            } catch (e) {
                addLog('error', `Failed to fetch status: ${e.message}`);
            }
        }

        async function testHealth() {
            try {
                const url = getServerUrl();
                const res = await fetch(`${url}/health`);
                const data = await res.json();
                apiResponse.textContent = JSON.stringify(data, null, 2);
                updateStats(data);
                addLog('success', '🏥 Health check OK', data);
            } catch (e) {
                apiResponse.textContent = `Error: ${e.message}`;
                addLog('error', `Health check failed: ${e.message}`);
            }
        }

        async function testStatus() {
            try {
                const url = getServerUrl();
                const res = await fetch(`${url}/api/status`);
                const data = await res.json();
                apiResponse.textContent = JSON.stringify(data, null, 2);
                updateStats(data);
                addLog('success', '📊 Status fetched', data);
            } catch (e) {
                apiResponse.textContent = `Error: ${e.message}`;
                addLog('error', `Status fetch failed: ${e.message}`);
            }
        }

        async function testTest() {
            try {
                const url = getServerUrl();
                const res = await fetch(`${url}/test`);
                const data = await res.json();
                apiResponse.textContent = JSON.stringify(data, null, 2);
                addLog('success', '🧪 Test endpoint OK', data);
            } catch (e) {
                apiResponse.textContent = `Error: ${e.message}`;
                addLog('error', `Test endpoint failed: ${e.message}`);
            }
        }

        async function sendAdminNotification() {
            const email = document.getElementById('adminEmail').value;
            const type = document.getElementById('adminType').value;
            const message = document.getElementById('adminMessage').value;

            if (!email || !type || !message) {
                addLog('error', 'Missing fields for notification');
                return;
            }

            try {
                const url = getServerUrl();
                const res = await fetch(`${url}/api/notify-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, type, message })
                });
                const data = await res.json();
                apiResponse.textContent = JSON.stringify(data, null, 2);
                addLog('success', '📧 Notification sent', data);
                if (data.clients !== undefined) clientCount.textContent = data.clients;
            } catch (e) {
                apiResponse.textContent = `Error: ${e.message}`;
                addLog('error', `Notification failed: ${e.message}`);
            }
        }

        async function sendAdminAction() {
            const userId = document.getElementById('actionUserId').value;
            const newStatus = document.getElementById('actionStatus').value;
            const email = document.getElementById('actionEmail').value;
            const authCode = document.getElementById('actionAuthCode').value;

            if (!userId || !newStatus) {
                addLog('error', 'Missing userId or newStatus');
                return;
            }

            try {
                const url = getServerUrl();
                const res = await fetch(`${url}/api/admin-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, newStatus, email, authCode })
                });
                const data = await res.json();
                apiResponse.textContent = JSON.stringify(data, null, 2);
                addLog('success', '⚡ Admin action sent', data);
                if (data.clients !== undefined) clientCount.textContent = data.clients;
            } catch (e) {
                apiResponse.textContent = `Error: ${e.message}`;
                addLog('error', `Admin action failed: ${e.message}`);
            }
        }

        // ===== AUTO-CONNECT =====
        // Try to connect on page load
        window.addEventListener('load', () => {
            addLog('info', '🔄 Test panel loaded');
            // Auto-connect after 500ms
            setTimeout(() => {
                connectSocket();
            }, 500);

            // Poll status every 5 seconds
            setInterval(() => {
                if (isConnected) {
                    fetchStatus();
                }
            }, 5000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                connectSocket();
            }
            if (e.key === 'Escape') {
                disconnectSocket();
            }
        });
    </script>
</body>

</html>
