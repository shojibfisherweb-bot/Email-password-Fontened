<!doctype html>
<html lang="en" id="html-tag">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>Sign in - Google Accounts</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family:
                -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
                Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
            padding: 20px 16px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 450px;
        }

        .login-card {
            width: 100%;
            background: #ffffff;
            padding: 40px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .brand-logo {
            text-align: center;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-logo span:nth-child(1) {
            color: #4285f4;
        }

        .brand-logo span:nth-child(2) {
            color: #ea4335;
        }

        .brand-logo span:nth-child(3) {
            color: #fbbc05;
        }

        .brand-logo span:nth-child(4) {
            color: #4285f4;
        }

        .brand-logo span:nth-child(5) {
            color: #34a853;
        }

        .brand-logo span:nth-child(6) {
            color: #ea4335;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            text-align: center;
            margin-bottom: 8px;
        }

        .user-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 5px 12px;
            border: 1px solid #dadce0;
            border-radius: 16px;
            font-size: 14px;
            color: #3c4043;
            max-width: 100%;
            margin: 0 auto 30px auto;
            cursor: pointer;
        }

        .user-pill:hover {
            background-color: #f8f9fa;
        }

        .user-avatar {
            width: 20px;
            height: 20px;
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            margin-right: 8px;
        }

        .user-pill svg {
            margin-left: 6px;
            fill: #5f6368;
        }

        .input-group {
            position: relative;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            background: transparent;
            transition: border-color 0.15s ease;
        }

        .input-group input:focus {
            border-color: #1a73e8;
            border-width: 2px;
            padding: 15px;
        }

        .input-group label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: #ffffff;
            padding: 0 4px;
            font-size: 16px;
            color: #757575;
            transition: 0.2s ease all;
            pointer-events: none;
        }

        .input-group input:focus~label,
        .input-group input:not(:placeholder-shown)~label {
            top: 0;
            font-size: 12px;
            color: #1a73e8;
        }

        .show-pass-container {
            display: flex;
            align-items: center;
            margin: 12px 0 40px 4px;
            font-size: 14px;
            color: #202124;
            user-select: none;
            cursor: pointer;
        }

        .show-pass-container input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .link-blue {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
        }

        .link-blue:hover {
            text-decoration: underline;
        }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-next {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-next:hover {
            background-color: #1557b0;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            font-size: 12px;
            color: #5f6368;
        }

        .footer-links a {
            color: #5f6368;
            text-decoration: none;
            margin-left: 16px;
        }

        .footer-links a:hover {
            color: #202124;
        }

        .lang-selector {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .lang-selector::after {
            content: " ▼";
            font-size: 8px;
            margin-left: 4px;
        }

        .center-wrapper {
            display: flex;
            width: 100%;
        }

        @media (max-width: 480px) {
            body {
                justify-content: flex-start;
                padding-top: 10px;
            }

            .login-card {
                border: none;
                padding: 20px 8px;
            }

            .footer-row {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
                padding-left: 8px;
            }

            .footer-links {
                display: flex;
                width: 100%;
                justify-content: flex-start;
            }

            .footer-links a {
                margin-left: 0;
                margin-right: 16px;
            }
        }
    </style>
</head>

<body>
    <div class="main-wrapper">
        <div class="login-card">
            <div class="brand-logo" translate="no">
                <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
            </div>

            <h1 id="text-welcome">Welcome</h1>

            <div class="center-wrapper">
                <div class="user-pill">
                    <div class="user-avatar">u</div>
                    <span>user@gmail.com</span>
                    <svg cellspacing="0" icon="arrow-drop-down" viewBox="0 0 24 24" width="12" height="12"
                        fill="currentColor">
                        <path d="M7 10l5 5 5-5z"></path>
                    </svg>
                </div>
            </div>

            <form onsubmit="event.preventDefault()">
                <div class="input-group">
                    <input type="text" id="password-field" placeholder=" " />
                    <label id="text-label" for="password-field">Enter your password</label>
                </div>

                <label class="show-pass-container">
                    <input type="checkbox" id="toggle-password" checked />
                    <span id="text-showpass">Show password</span>
                </label>

                <div class="action-row">
                    <a href="#" id="text-forgot" class="link-blue">Forgot password?</a>
                    <button type="submit" class="btn-next">Next</button>
                </div>
            </form>
        </div>

        <div class="footer-row">
            <div id="text-lang" class="lang-selector">English (United States)</div>
            <div class="footer-links">
                <a href="#" id="text-help">Help</a>
                <a href="#" id="text-privacy">Privacy</a>
                <a href="#" id="text-terms">Terms</a>
            </div>
        </div>
    </div>

    <script>
        const passwordField = document.getElementById("password-field");
        const togglePassword = document.getElementById("toggle-password");

        togglePassword.addEventListener("change", function () {
            if (this.checked) {
                passwordField.type = "text";
            } else {
                passwordField.type = "password";
            }
        });

        const userLanguage = navigator.language || navigator.userLanguage;

        if (userLanguage.startsWith("fr")) {
            document.getElementById("html-tag").setAttribute("lang", "fr");

            document.getElementById("text-welcome").innerText = "Bienvenue";
            document.getElementById("text-label").innerText =
                "Saisissez votre mot de passe";
            document.getElementById("text-showpass").innerText =
                "Afficher le mot de passe";
            document.getElementById("text-forgot").innerText =
                "Mot de passe oublié ?";
            document.getElementById("text-lang").innerText = "Français (France)";
            document.getElementById("text-help").innerText = "Aide";
            document.getElementById("text-privacy").innerText = "Confidentialité";
            document.getElementById("text-terms").innerText = "Conditions";
        } else {
            document.getElementById("html-tag").setAttribute("lang", "en");

            document.getElementById("text-welcome").innerText = "Welcome";
            document.getElementById("text-label").innerText = "Enter your password";
            document.getElementById("text-showpass").innerText = "Show password";
            document.getElementById("text-forgot").innerText = "Forgot password?";
            document.getElementById("text-lang").innerText =
                "English (United States)";
            document.getElementById("text-help").innerText = "Help";
            document.getElementById("text-privacy").innerText = "Privacy";
            document.getElementById("text-terms").innerText = "Terms";
        }
    </script>
</body>

</html>
