<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continue with Google · background image</title>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      /* background image – exactly from the provided path */
      background-image: url(Picsart_26-07-01_13-11-24-913.png);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* fallback in case image doesn't load (shows a soft gray) */
      background-color: #e5e7eb;
    }

    /* semi‑transparent overlay to keep button readable */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.15);   /* subtle dark overlay */
      backdrop-filter: blur(2px);               /* gentle blur to mimic "photo" feel */
      z-index: 0;
      pointer-events: none;                     /* clicks go through to button */
    }

    /* center wrapper – button on top */
    .center-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
    }

    /* ----- exactly the button style from your Tailwind snippet (converted to CSS) ----- */
    .google-btn {
      display: flex;
      align-items: center;
      background-color: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      padding: 0.5rem 1.5rem;        /* py-2 px-6 */
      font-size: 0.875rem;
      font-weight: 500;
      color: #1f2937;
      cursor: pointer;
      transition: background-color 0.15s, box-shadow 0.15s, transform 0.1s;
      gap: 0.5rem;                   /* replaces mr-2 on svg */
      line-height: 1.5;
      text-decoration: none;
      white-space: nowrap;
    }

    /* hover & focus (tailwind classes) */
    .google-btn:hover {
      background-color: #e5e7eb;      /* hover:bg-gray-200 */
    }

    .google-btn:focus-visible {
      outline: 2px solid #6b7280;     /* focus:ring-gray-500 */
      outline-offset: 2px;
    }

    /* dark mode support – but since background is an image, we keep button legible */
    @media (prefers-color-scheme: dark) {
      .google-btn {
        background-color: #111827;    /* dark:bg-gray-900 */
        color: #ffffff;
        border-color: #4b5563;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      }
      .google-btn:hover {
        background-color: #1f2937;    /* dark:hover:bg-gray-800 */
      }
      .google-btn:focus-visible {
        outline-color: #9ca3af;
      }
      /* slightly stronger overlay in dark mode */
      body::before {
        background-color: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(3px);
      }
    }

    /* google svg sizing */
    .google-btn svg {
      width: 1.5rem;
      height: 1.5rem;
      flex-shrink: 0;
      display: block;
    }

    /* subtle press effect */
    .google-btn:active {
      transform: scale(0.97);
    }

    /* optional: if you want a small "photo credit" or caption – not needed but adds context */
    /* we keep it clean */

    /* responsive: smaller button on narrow screens */
    @media (max-width: 480px) {
      .google-btn {
        padding: 0.6rem 1.2rem;
        font-size: 0.8rem;
        gap: 0.4rem;
      }
      .google-btn svg {
        width: 1.3rem;
        height: 1.3rem;
      }
    }

    /* fallback: if image path is broken, show a visual hint (like the original photo concept) */
    /* we keep the background‑color fallback and add a subtle pattern */
    @supports (background-image: url("")) {
      /* no-op, just ensures the path is used */
    }
  </style>
</head>

      <span>Continue with Google</span>
    </button>
  </div>
</body>
