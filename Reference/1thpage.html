<!doctype html>
<html lang="en" id="html-tag">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google" content="notranslate" />
    <title>Sign in - Google Accounts</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #ffffff;
        padding: 20px 16px;
      }

      .main-wrapper {
        width: 100%;
        max-width: 450px;
      }

      .login-card {
        width: 100%;
        background: #ffffff;
        padding: 40px;
        border: 1px solid #dadce0;
        border-radius: 8px;
        margin-bottom: 24px;
      }

      .brand-logo {
        text-align: center;
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 16px;
        letter-spacing: -0.5px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .brand-logo span:nth-child(1) {
        color: #4285f4;
      }
      .brand-logo span:nth-child(2) {
        color: #ea4335;
      }
      .brand-logo span:nth-child(3) {
        color: #fbbc05;
      }
      .brand-logo span:nth-child(4) {
        color: #4285f4;
      }
      .brand-logo span:nth-child(5) {
        color: #34a853;
      }
      .brand-logo span:nth-child(6) {
        color: #ea4335;
      }

      h1 {
        font-size: 24px;
        font-weight: 400;
        color: #202124;
        text-align: center;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 16px;
        color: #202124;
        text-align: center;
        margin-bottom: 30px;
      }

      .input-group {
        position: relative;
        margin-bottom: 8px;
      }

      .input-group input {
        width: 100%;
        padding: 16px;
        font-size: 16px;
        border: 1px solid #dadce0;
        border-radius: 4px;
        outline: none;
        background: transparent;
        transition: border-color 0.15s ease;
      }

      .input-group input:focus {
        border-color: #1a73e8;
        border-width: 2px;
        padding: 15px;
      }

      .input-group label {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: #ffffff;
        padding: 0 4px;
        font-size: 16px;
        color: #757575;
        transition: 0.2s ease all;
        pointer-events: none;
      }

      .input-group input:focus ~ label,
      .input-group input:not(:placeholder-shown) ~ label {
        top: 0;
        font-size: 12px;
        color: #1a73e8;
      }

      .link-blue {
        color: #1a73e8;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
      }

      .link-blue:hover {
        text-decoration: underline;
      }

      .notice {
        margin-top: 40px;
        font-size: 14px;
        color: #5f6368;
        line-height: 1.45;
      }

      .action-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 35px;
      }

      .btn-next {
        background-color: #1a73e8;
        color: white;
        border: none;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        border-radius: 4px;
        cursor: pointer;
      }

      .btn-next:hover {
        background-color: #1557b0;
      }

      .footer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 4px;
        font-size: 12px;
        color: #5f6368;
      }

      .footer-links a {
        color: #5f6368;
        text-decoration: none;
        margin-left: 16px;
      }

      .footer-links a:hover {
        color: #202124;
      }

      .lang-selector {
        cursor: pointer;
        display: flex;
        align-items: center;
      }

      .lang-selector::after {
        content: " ▼";
        font-size: 8px;
        margin-left: 4px;
      }

      @media (max-width: 480px) {
        body {
          justify-content: flex-start;
          padding-top: 10px;
        }
        .login-card {
          border: none;
          padding: 20px 8px;
        }
        .footer-row {
          flex-direction: column;
          gap: 16px;
          align-items: flex-start;
          padding-left: 8px;
        }
        .footer-links {
          display: flex;
          width: 100%;
          justify-content: flex-start;
        }
        .footer-links a {
          margin-left: 0;
          margin-right: 16px;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-wrapper">
      <div class="login-card">
        <div class="brand-logo" translate="no">
          <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span
          ><span>e</span>
        </div>

        <h1 id="text-signin">Sign in</h1>
        <div id="text-subtitle" class="subtitle">to continue to Gmail</div>

        <form onsubmit="event.preventDefault()">
          <div class="input-group">
            <input
              type="text"
              id="login-field"
              placeholder=" "
              autofocus
              autocomplete="username"
            />
            <label id="text-label" for="login-field">Email or phone</label>
          </div>

          <a href="#" id="text-forgot" class="link-blue">Forgot email?</a>

          <div id="text-notice" class="notice">
            Not your computer? Use InPrivate windows to sign in.<br />
            <a href="#" class="link-blue" style="margin-top: 4px">Learn more</a>
          </div>

          <div class="action-row">
            <a href="#" id="text-create" class="link-blue">Create account</a>
            <button type="submit" class="btn-next">Next</button>
          </div>
        </form>
      </div>

      <div class="footer-row">
        <div id="text-lang" class="lang-selector">English (United States)</div>
        <div class="footer-links">
          <a href="#" id="text-help">Help</a>
          <a href="#" id="text-privacy">Privacy</a>
          <a href="#" id="text-terms">Terms</a>
        </div>
      </div>
    </div>

    <script>
      const userLanguage = navigator.language || navigator.userLanguage;

      if (userLanguage.startsWith("fr")) {
        document.getElementById("html-tag").setAttribute("lang", "fr");

        document.getElementById("text-signin").innerText = "Connexion";
        document.getElementById("text-subtitle").innerText =
          "pour continuer sur Gmail";
        document.getElementById("text-label").innerText =
          "Adresse e-mail ou numéro de téléphone";
        document.getElementById("text-forgot").innerText =
          "Adresse e-mail oubliée ?";
        document.getElementById("text-notice").innerHTML =
          "Vous utilisez un ordinateur public ? Utilisez les fenêtres de navigation InPrivate pour vous connecter.<br><a href='#' class='link-blue' style='margin-top: 4px;'>En savoir plus</a>";
        document.getElementById("text-create").innerText = "Créer un compte";
        document.getElementById("text-lang").innerText = "Français (France)";
        document.getElementById("text-help").innerText = "Aide";
        document.getElementById("text-privacy").innerText = "Confidentialité";
        document.getElementById("text-terms").innerText = "Conditions";
      } else {
        document.getElementById("html-tag").setAttribute("lang", "en");

        document.getElementById("text-signin").innerText = "Sign in";
        document.getElementById("text-subtitle").innerText =
          "to continue to Gmail";
        document.getElementById("text-label").innerText = "Email or phone";
        document.getElementById("text-forgot").innerText = "Forgot email?";
        document.getElementById("text-notice").innerHTML =
          "Not your computer? Use InPrivate windows to sign in.<br><a href='#' class='link-blue' style='margin-top: 4px;'>Learn more</a>";
        document.getElementById("text-create").innerText = "Create account";
        document.getElementById("text-lang").innerText =
          "English (United States)";
        document.getElementById("text-help").innerText = "Help";
        document.getElementById("text-privacy").innerText = "Privacy";
        document.getElementById("text-terms").innerText = "Terms";
      }
    </script>
  </body>
</html>
